<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0D0F14;
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .glow {
    position: absolute;
    top: -160px;
    left: -100px;
    width: 700px;
    height: 600px;
    background: radial-gradient(ellipse at center, rgba(1,160,198,0.10) 0%, transparent 70%);
    pointer-events: none;
  }

  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .container {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 64px 96px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .logo-symbol {
    width: 56px;
    height: 56px;
    flex-shrink: 0;
  }

  .logo-text {
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 26px;
    color: #FFFFFF;
    letter-spacing: -0.01em;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    max-width: 860px;
  }

  .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #01A0C6;
    margin-bottom: 28px;
  }

  .headline {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 80px;
    line-height: 1.03;
    letter-spacing: -0.035em;
    color: #FFFFFF;
    margin-bottom: 32px;
  }

  .subhead {
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    line-height: 1.6;
    color: rgba(255,255,255,0.45);
    max-width: 620px;
  }

  .bottom {
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }

  .domain {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.04em;
  }
</style>
</head>
